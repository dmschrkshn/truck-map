<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Автовозы в пути</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden;
      font-family: -apple-system, "Segoe UI", Roboto, Helvetica, sans-serif; }
    #map { width:100%; height:100%; }

    #panel {
      position:absolute; top:0; left:0; bottom:0; width:300px; z-index:1000;
      background:#fff; box-shadow:2px 0 14px rgba(0,0,0,.12);
      display:flex; flex-direction:column; transition:transform .25s ease;
    }
    #panel.hidden { transform:translateX(-300px); }
    #panel-head { padding:15px 16px 11px; border-bottom:1px solid #eceff1; }
    #panel-head h1 { margin:0 0 3px; font-size:16px; font-weight:600; color:#1c2833; }
    #panel-head .sub { font-size:12px; color:#90a4ae; margin-bottom:11px; }

    #search {
      width:100%; padding:8px 11px; font-size:13px;
      border:1px solid #cfd8dc; border-radius:7px; outline:none;
      transition:border-color .15s;
    }
    #search:focus { border-color:#2c7fb8; }

    #list { flex:1; overflow-y:auto; padding:5px 0; }
    #empty { padding:22px 16px; font-size:13px; color:#b0bec5; text-align:center; }

    .item {
      display:flex; align-items:flex-start; gap:10px;
      padding:11px 16px; cursor:pointer; border-left:3px solid transparent;
      transition:background .12s;
    }
    .item:hover { background:#f5f7f9; }
    .item.active { background:#eef4f8; border-left-color:#2c7fb8; }
    .item .ico { width:24px; flex:none; padding-top:2px; }
    .item .txt { min-width:0; flex:1; }
    .item .name { font-size:14px; font-weight:600; color:#263238; }
    .item .meta { font-size:12px; color:#78909c; margin-top:2px; }
    .item .note {
      font-size:11px; color:#8d6e63; margin-top:4px;
      background:#fff8e1; padding:3px 7px; border-radius:4px;
      display:inline-block; max-width:100%; overflow:hidden;
      text-overflow:ellipsis; white-space:nowrap;
    }
    .item.lost .meta { color:#c0392b; font-weight:600; }

    #toggle {
      position:absolute; top:14px; left:314px; z-index:1001;
      width:34px; height:34px; border:0; border-radius:7px; background:#fff;
      box-shadow:0 2px 8px rgba(0,0,0,.16); cursor:pointer;
      font-size:17px; line-height:1; color:#455a64; transition:left .25s ease;
    }
    #panel.hidden ~ #toggle { left:14px; }

    #legend {
      position:absolute; bottom:20px; right:14px; z-index:1000;
      background:#fff; padding:11px 15px; border-radius:9px;
      box-shadow:0 2px 12px rgba(0,0,0,.16); font-size:13px; line-height:1.75;
    }
    #legend b { display:block; margin-bottom:7px; font-size:10px;
      letter-spacing:.06em; color:#90a4ae; font-weight:600; }
    #legend div { display:flex; align-items:center; gap:9px; color:#37474f; }
    #legend .sw { width:13px; height:13px; border-radius:3px; flex:none; }

    #stamp {
      position:absolute; top:14px; right:14px; z-index:1000;
      background:rgba(255,255,255,.95); padding:7px 13px; border-radius:7px;
      font-size:12px; color:#546e7a; box-shadow:0 2px 10px rgba(0,0,0,.13);
    }

    @media (max-width: 720px) {
      #panel { width:250px; }
      #panel.hidden { transform:translateX(-250px); }
      #toggle { left:264px; }
      #legend { bottom:12px; right:10px; font-size:12px; padding:9px 12px; }
      #stamp { display:none; }
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div id="panel">
    <div id="panel-head">
      <h1>Автовозы в пути</h1>
      <div class="sub" id="count">загрузка…</div>
      <input id="search" type="text" placeholder="Поиск по номеру…" autocomplete="off">
    </div>
    <div id="list"></div>
  </div>
  <button id="toggle" title="Свернуть список">☰</button>

  <div id="stamp">загрузка…</div>

  <div id="legend">
    <b>ДАВНОСТЬ ДАННЫХ</b>
    <div><span class="sw" style="background:#2e9e5b"></span> до 2 дней</div>
    <div><span class="sw" style="background:#e08b1e"></span> 3–4 дня</div>
    <div><span class="sw" style="background:#222"></span> 5 дней и более</div>
  </div>

  <script src="https://api-maps.yandex.ru/2.1/?apikey=aeb19683-8505-416a-a1c4-090e24030cd0&lang=ru_RU"></script>

  <script>
    var API = 'https://script.google.com/macros/s/AKfycbwdjusGg4nQmK9jieXklITebNhkSC4Pu8fbqA2NsGxgtjhRk_id0W7MbYForU901Xki/exec';

    var map, cluster, records = [], marksByTruck = {};

    function truckSVG(color, w, h) {
      w = w || 46; h = h || 30;
      return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 46 30" width="' + w + '" height="' + h + '">' +
        '<g fill="none" fill-rule="evenodd">' +
          '<path d="M9 4h30v3H9z" fill="' + color + '" opacity=".5"/>' +
          '<rect x="12" y="1.4" width="7" height="3.2" rx="1" fill="' + color + '" opacity=".8"/>' +
          '<rect x="21" y="1.4" width="7" height="3.2" rx="1" fill="' + color + '" opacity=".8"/>' +
          '<rect x="30" y="1.4" width="7" height="3.2" rx="1" fill="' + color + '" opacity=".8"/>' +
          '<path d="M9.5 7v9M38.5 7v9" stroke="' + color + '" stroke-width="1.4" opacity=".6"/>' +
          '<path d="M2 11h6l3 4v6H2z" fill="' + color + '"/>' +
          '<rect x="3.4" y="12.4" width="3.4" height="3" rx=".6" fill="#fff" opacity=".85"/>' +
          '<rect x="11" y="9" width="28" height="12" rx="1.4" fill="' + color + '"/>' +
          '<rect x="14" y="11.5" width="7.5" height="4" rx="1" fill="#fff" opacity=".78"/>' +
          '<rect x="23.5" y="11.5" width="7.5" height="4" rx="1" fill="#fff" opacity=".78"/>' +
          '<circle cx="7" cy="23.5" r="3.6" fill="#1a1a1a"/>' +
          '<circle cx="7" cy="23.5" r="1.5" fill="#eceff1"/>' +
          '<circle cx="28" cy="23.5" r="3.6" fill="#1a1a1a"/>' +
          '<circle cx="28" cy="23.5" r="1.5" fill="#eceff1"/>' +
          '<circle cx="36.5" cy="23.5" r="3.6" fill="#1a1a1a"/>' +
          '<circle cx="36.5" cy="23.5" r="1.5" fill="#eceff1"/>' +
        '</g></svg>';
    }

    function escapeXml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function markerSVG(color, label, hasNote) {
      var text = escapeXml(label);
      var w = Math.max(58, text.length * 7.4 + 16);
      var svgW = Math.max(w, 46);
      var cx = svgW / 2;

      return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(
        '<svg xmlns="http://www.w3.org/2000/svg" width="' + svgW + '" height="52" viewBox="0 0 ' + svgW + ' 52">' +
          '<rect x="' + (cx - w / 2) + '" y="0" width="' + w + '" height="17" rx="4" fill="' + color + '"/>' +
          '<text x="' + cx + '" y="12.5" font-family="-apple-system,Segoe UI,Roboto,sans-serif" ' +
            'font-size="11" font-weight="600" fill="#fff" text-anchor="middle">' + text + '</text>' +
          (hasNote ? '<circle cx="' + (cx + w / 2 - 4) + '" cy="3" r="4.5" fill="#c0392b" stroke="#fff" stroke-width="1.2"/>' : '') +
          '<g transform="translate(' + (cx - 23) + ',20)">' +
            truckSVG(color, 46, 30).replace(/^<svg[^>]*>/, '').replace(/<\/svg>$/, '') +
          '</g>' +
        '</svg>'
      );
    }

    function ageColor(d) {
      if (d <= 2) return '#2e9e5b';
      if (d <= 4) return '#e08b1e';
      return '#222222';
    }

    function agoText(d) {
      if (d === 0) return 'сегодня';
      if (d === 1) return 'вчера';
      var last = d % 10, tens = d % 100;
      var w = (last === 1 && tens !== 11) ? 'день'
            : (last >= 2 && last <= 4 && (tens < 12 || tens > 14)) ? 'дня' : 'дней';
      return d + ' ' + w + ' назад';
    }

    function daysWord(d) {
      var last = d % 10, tens = d % 100;
      if (last === 1 && tens !== 11) return 'день';
      if (last >= 2 && last <= 4 && (tens < 12 || tens > 14)) return 'дня';
      return 'дней';
    }

    function etaText(eta) {
      if (eta === 0) return 'прибыл';
      return '~' + eta + ' ' + daysWord(eta);
    }

    function kmText(km) {
      return km.toLocaleString('ru-RU') + ' км';
    }

    ymaps.ready(function () {
      map = new ymaps.Map('map', {
        center: [58, 60], zoom: 4,
        controls: ['zoomControl', 'fullscreenControl', 'typeSelector']
      }, { suppressMapOpenBlock: true });

      cluster = new ymaps.Clusterer({
        groupByCoordinates: false,
        gridSize: 80,
        clusterDisableClickZoom: false,
        clusterOpenBalloonOnClick: true,
        clusterBalloonContentLayout: 'cluster#balloonCarousel',
        clusterBalloonPagerSize: 5,
        clusterIconLayout: 'default#pieChart',
        clusterIconPieChartRadius: 22,
        clusterIconPieChartCoreRadius: 14,
        clusterIconPieChartStrokeWidth: 2
      });
      map.geoObjects.add(cluster);

      refresh();
      setInterval(refresh, 300000);
    });

    document.getElementById('toggle').onclick = function () {
      document.getElementById('panel').classList.toggle('hidden');
      setTimeout(function () { if (map) map.container.fitToViewport(); }, 260);
    };

    document.getElementById('search').oninput = function () {
      renderList(this.value.trim().toLowerCase());
    };

    function renderList(filter) {
      var list = document.getElementById('list');
      list.innerHTML = '';

      var shown = records.filter(function (p) {
        return !filter || p.truck.toLowerCase().indexOf(filter) !== -1;
      });

      if (!shown.length) {
        list.innerHTML = '<div id="empty">Ничего не найдено</div>';
        return;
      }

      shown.forEach(function (p) {
        var item = document.createElement('div');
        item.className = 'item' + (p.days >= 5 ? ' lost' : '');

        var noteHtml = p.note
          ? '<div class="note" title="' + escapeXml(p.note) + '">' + escapeXml(p.note) + '</div>'
          : '';

        item.innerHTML =
          '<span class="ico">' + truckSVG(p.color, 24, 16) + '</span>' +
          '<span class="txt">' +
            '<div class="name">' + p.truck + '</div>' +
            '<div class="meta">' + kmText(p.km) + ' · ' + etaText(p.eta) + ' · ' + agoText(p.days) + '</div>' +
            noteHtml +
          '</span>';

        item.onclick = function () {
          var all = document.querySelectorAll('.item');
          for (var i = 0; i < all.length; i++) all[i].classList.remove('active');
          item.classList.add('active');
          map.setCenter([p.lat, p.lon], 9, { duration: 500 });
          setTimeout(function () {
            var pm = marksByTruck[p.truck];
            if (pm) pm.balloon.open();
          }, 560);
        };

        list.appendChild(item);
      });
    }

    function balloonBody(p) {
      var lost = p.days >= 5;
      var noteBlock = p.note
        ? '<div style="margin-top:10px;padding:8px 10px;background:#fff8e1;' +
          'border-left:3px solid #e08b1e;border-radius:0 4px 4px 0;font-size:12px;color:#5d4037">' +
          '<b>Комментарий</b><br>' + escapeXml(p.note) + '</div>'
        : '';

      var lostBlock = lost
        ? '<div style="color:#c0392b;margin-top:9px;font-weight:600;font-size:12px">Связь потеряна</div>'
        : '';

      return '<div style="font-size:13px;line-height:1.85;min-width:200px">' +
          '<table style="width:100%;border-collapse:collapse">' +
            '<tr><td style="color:#78909c;padding-right:12px">До Москвы</td>' +
                '<td style="text-align:right;font-weight:600">' + kmText(p.km) + '</td></tr>' +
            '<tr><td style="color:#78909c">Прибытие</td>' +
                '<td style="text-align:right;font-weight:600">' + etaText(p.eta) + '</td></tr>' +
            '<tr><td style="color:#78909c">Обновлено</td>' +
                '<td style="text-align:right">' + p.ts.toLocaleDateString('ru-RU') + '</td></tr>' +
            '<tr><td style="color:#78909c">Давность</td>' +
                '<td style="text-align:right;color:' + (lost ? '#c0392b' : '#37474f') + '">' + agoText(p.days) + '</td></tr>' +
          '</table>' +
          noteBlock + lostBlock +
        '</div>';
    }

    function refresh() {
      fetch(API + '?t=' + Date.now())
        .then(function (r) { return r.json(); })
        .then(function (data) {
          records = data.map(function (p) {
            var ts = new Date(p.ts);
            var days = Math.floor((Date.now() - ts) / 864e5);
            return {
              truck: p.truck, lat: p.lat, lon: p.lon, ts: ts, days: days,
              km: p.km || 0, eta: (p.eta === 0 ? 0 : (p.eta || 0)),
              note: p.note || '', color: ageColor(days)
            };
          });

          records.sort(function (a, b) { return a.km - b.km; });

          cluster.removeAll();
          marksByTruck = {};

          var placemarks = records.map(function (p) {
            var pm = new ymaps.Placemark([p.lat, p.lon], {
              balloonContentHeader: 'Автовоз ' + p.truck,
              balloonContentBody: balloonBody(p),
              hintContent: '<b>' + p.truck + '</b> · ' + kmText(p.km) + ' до Москвы',
              clusterCaption: p.truck + ' · ' + kmText(p.km)
            }, {
              iconLayout: 'default#image',
              iconImageHref: markerSVG(p.color, p.truck, !!p.note),
              iconImageSize: [Math.max(58, p.truck.length * 7.4 + 16), 52],
              iconImageOffset: [-Math.max(58, p.truck.length * 7.4 + 16) / 2, -48],
              balloonMaxWidth: 280,
              hideIconOnBalloonOpen: false
            });
            marksByTruck[p.truck] = pm;
            return pm;
          });

          cluster.add(placemarks);

          if (placemarks.length) {
            map.setBounds(cluster.getBounds(), { checkZoomRange: true, zoomMargin: 80 });
          }

          var lostCount = records.filter(function (p) { return p.days >= 5; }).length;
          var noteCount = records.filter(function (p) { return p.note; }).length;

          var sub = 'В пути: ' + records.length;
          if (lostCount) sub += ' · без связи: ' + lostCount;
          if (noteCount) sub += ' · с примечаниями: ' + noteCount;
          document.getElementById('count').textContent = sub;

          document.getElementById('stamp').textContent =
            'Обновлено ' + new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });

          renderList(document.getElementById('search').value.trim().toLowerCase());
        })
        .catch(function () {
          document.getElementById('count').textContent = 'Ошибка загрузки';
          document.getElementById('stamp').textContent = 'Нет связи с базой';
        });
    }
  </script>
</body>
</html>
