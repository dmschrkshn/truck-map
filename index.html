<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Автовозы в пути</title>
  <style>
    html, body, #map { margin:0; padding:0; width:100%; height:100%; }
    #legend {
      position:absolute; bottom:24px; left:12px; z-index:1000;
      background:#fff; padding:10px 14px; border-radius:8px;
      box-shadow:0 2px 10px rgba(0,0,0,.18);
      font:13px/1.7 -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    #legend b { display:block; margin-bottom:6px; font-size:11px; letter-spacing:.04em; color:#888; }
    #legend div { display:flex; align-items:center; gap:9px; }
    .dot { width:11px; height:11px; border-radius:50%; flex:none; }
    #stamp {
      position:absolute; top:12px; right:12px; z-index:1000;
      background:rgba(255,255,255,.94); padding:7px 13px; border-radius:6px;
      font:12px -apple-system, "Segoe UI", Roboto, sans-serif; color:#555;
      box-shadow:0 2px 10px rgba(0,0,0,.15);
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="stamp">загрузка…</div>
  <div id="legend">
    <b>ДАВНОСТЬ ДАННЫХ</b>
    <div><span class="dot" style="background:#2ecc71"></span> до 2 дней</div>
    <div><span class="dot" style="background:#f39c12"></span> 3–4 дня</div>
    <div><span class="dot" style="background:#000000"></span> 5 дней и более</div>
  </div>

  <!-- ↓↓↓ ЗАМЕНИТЕ ВСТАВЬТЕ_КЛЮЧ НА КЛЮЧ ЯНДЕКСА ↓↓↓ -->
  <script src="https://api-maps.yandex.ru/2.1/?apikey=aeb19683-8505-416a-a1c4-090e24030cd0&lang=ru_RU"></script>

  <script>
    const API = 'https://script.google.com/macros/s/AKfycbwdjusGg4nQmK9jieXklITebNhkSC4Pu8fbqA2NsGxgtjhRk_id0W7MbYForU901Xki/exec';

    let map, cluster;

    ymaps.ready(function () {
      map = new ymaps.Map('map', {
        center: [55.75, 37.62], zoom: 4,
        controls: ['zoomControl', 'fullscreenControl']
      });
      cluster = new ymaps.Clusterer({ groupByCoordinates: false, gridSize: 48 });
      map.geoObjects.add(cluster);
      refresh();
      setInterval(refresh, 300000);
    });

    function ageColor(d) {
      if (d <= 2) return '#2ecc71';
      if (d <= 4) return '#f39c12';
      return '#000000';
    }

    function agoText(d) {
      if (d === 0) return 'сегодня';
      if (d === 1) return 'вчера';
      var last = d % 10, tens = d % 100;
      var w = (last === 1 && tens !== 11) ? 'день'
            : (last >= 2 && last <= 4 && (tens < 12 || tens > 14)) ? 'дня' : 'дней';
      return d + ' ' + w + ' назад';
    }

    async function refresh() {
      try {
        const res = await fetch(API + '?t=' + Date.now());
        const data = await res.json();
        cluster.removeAll();

        const marks = data.map(function (p) {
          const ts = new Date(p.ts);
          const days = Math.floor((Date.now() - ts) / 864e5);
          const warn = days >= 5
            ? '<div style="color:#c0392b;margin-top:7px"><b>Связь потеряна</b></div>' : '';

          return new ymaps.Placemark([p.lat, p.lon], {
            balloonContentHeader: 'Автовоз ' + p.truck,
            balloonContentBody:
              'Обновлено: <b>' + ts.toLocaleDateString('ru-RU') + '</b><br>' + agoText(days) + warn,
            hintContent: p.truck + ' · ' + agoText(days)
          }, {
            preset: 'islands#circleDotIcon',
            iconColor: ageColor(days)
          });
        });

        cluster.add(marks);
        if (marks.length) {
          map.setBounds(cluster.getBounds(), { checkZoomRange: true, zoomMargin: 50 });
        }
        document.getElementById('stamp').textContent =
          'Автовозов на карте: ' + marks.length + ' · ' + new Date().toLocaleTimeString('ru-RU');
      } catch (err) {
        document.getElementById('stamp').textContent = 'Ошибка загрузки данных';
      }
    }
  </script>
</body>
</html>
